{{- if eq .Values.SERVICE_MESH_TYPE "Istio" }}
# Internal routes
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: '{{ .Values.SERVICE_NAME }}-internal-routes'
  labels:
    app.kubernetes.io/name: '{{ printf "%s-internal-routes" .Values.SERVICE_NAME }}'
    app.kubernetes.io/instance: '{{ printf "%s-internal-routes-%s" .Values.SERVICE_NAME .Values.NAMESPACE | trunc 63 | trimSuffix "-" }}'
    app.kubernetes.io/version: '{{ .Chart.AppVersion }}'
    app.kubernetes.io/component: '{{ .Values.SERVICE_NAME }}'
    app.kubernetes.io/part-of: 'Cloud-Core'
    app.kubernetes.io/managed-by: 'Helm'
    app.kubernetes.io/processed-by-operator: 'istiod'
spec:
  parentRefs:
    - kind: Service
      name: {{ .Values.INTERNAL_SERVICE_NAME }}
      group: ""
      port: 8080
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v1/{{ .Values.SERVICE_NAME }}"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v1/"
      backendRefs:
        - name: {{ .Values.SERVICE_NAME }}
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v4/tenant-manager/manage/tenants/current/service/name"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v1/tenants/current/service/name"
      backendRefs:
        - name: {{ .Values.SERVICE_NAME }}
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v4/tenant-manager/activate/create-os-tenant-alias-routes/perform/"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v1/activate/create-os-tenant-alias-routes/perform/"
      backendRefs:
        - name: {{ .Values.SERVICE_NAME }}
          port: 8080
---
# Public routes
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: '{{ .Values.SERVICE_NAME }}-public-routes'
  labels:
    app.kubernetes.io/name: '{{ printf "%s-public-routes" .Values.SERVICE_NAME }}'
    app.kubernetes.io/instance: '{{ printf "%s-public-routes-%s" .Values.SERVICE_NAME .Values.NAMESPACE | trunc 63 | trimSuffix "-" }}'
    app.kubernetes.io/version: '{{ .Chart.AppVersion }}'
    app.kubernetes.io/component: '{{ .Values.SERVICE_NAME }}'
    app.kubernetes.io/part-of: 'Cloud-Core'
    app.kubernetes.io/managed-by: 'Helm'
    app.kubernetes.io/processed-by-operator: 'istiod'

spec:
  parentRefs:
    - name: {{ .Values.ISTIO_PUBLIC_GATEWAY_NAME }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v1/{{ .Values.SERVICE_NAME }}"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v1/"
      backendRefs:
        - name: {{ .Values.SERVICE_NAME }}
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v4/tenant-manager/manage/tenants/current/service/name"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v1/tenants/current/service/name"
      backendRefs:
        - name: {{ .Values.SERVICE_NAME }}
          port: 8080
{{- end }}