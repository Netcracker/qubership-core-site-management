{{- if eq .Values.SERVICE_MESH_TYPE "Istio" }}
{{ $ServiceName := .Values.SERVICE_NAME }}
{{ $ServiceName := eq .Values.K8S_SERVICE_TYPE "HEADLESS" | ternary (printf "%s-clusterip" $ServiceName) $ServiceName }}
# Internal routes
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: '{{ .Values.SERVICE_NAME }}-internal-routes'
  labels:
    app.kubernetes.io/name: '{{ .Values.SERVICE_NAME }}-internal-routes'
    app.kubernetes.io/version: "{{ .Chart.AppVersion }}"
    app.kubernetes.io/component: gateway-routes
    app.kubernetes.io/part-of: {{ .Values.SERVICE_NAME }}
    app.kubernetes.io/managed-by: Helm
spec:
  parentRefs:
    - kind: Service
      name: {{ .Values.INTERNAL_SERVICE_NAME }}
      group: ""
      port: 8080
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v1/{{ .Values.SERVICE_NAME }}"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v1/"
      backendRefs:
        - name: {{ $ServiceName }}
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v4/tenant-manager/manage/tenants/current/service/name"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v1/tenants/current/service/name"
      backendRefs:
        - name: {{ $ServiceName }}
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v4/tenant-manager/activate/create-os-tenant-alias-routes/perform/"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v1/activate/create-os-tenant-alias-routes/perform/"
      backendRefs:
        - name: {{ $ServiceName }}
          port: 8080
---
# Public routes
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: '{{ .Values.SERVICE_NAME }}-public-routes'
  labels:
    app.kubernetes.io/name: '{{ .Values.SERVICE_NAME }}-public-routes'
    app.kubernetes.io/version: "{{ .Chart.AppVersion }}"
    app.kubernetes.io/component: gateway-routes
    app.kubernetes.io/part-of: {{ .Values.SERVICE_NAME }}
    app.kubernetes.io/managed-by: Helm
spec:
  parentRefs:
    - name: {{ .Values.ISTIO_PUBLIC_GATEWAY_NAME }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v1/{{ .Values.SERVICE_NAME }}"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v1/"
      backendRefs:
        - name: {{ .Values.SERVICE_NAME }}
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v4/tenant-manager/manage/tenants/current/service/name"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v1/tenants/current/service/name"
      backendRefs:
        - name: {{ .Values.SERVICE_NAME }}
          port: 8080
{{- end }}